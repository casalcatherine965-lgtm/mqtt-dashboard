<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AWD Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #1f253d;
  color: #fff;
  text-align: center;
}

h1 { padding: 15px; margin: 0; }

.status { margin-bottom: 10px; font-weight: bold; }

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.card {
  background: #2c3246;
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.3);
}

.title { font-size: 1em; margin-bottom: 5px; }

button {
  background: #3498db;
  border: none;
  padding: 5px 10px;
  border-radius: 6px;
  color: white;
  cursor: pointer;
  margin-bottom: 5px;
}

.values {
  display: flex;
  justify-content: space-around;
  font-size: 0.85em;
}

.value span {
  display: block;
  font-size: 1.2em;
  font-weight: bold;
}

canvas {
  margin-top: 8px;
  width: 100% !important;
  height: 120px !important;
}
</style>
</head>

<body>

<h1>🌾 AWD Monitoring Dashboard</h1>
<div class="status">Status: <span id="status">Connecting...</span></div>

<div class="grid">

  <!-- NODE 1 -->
  <div class="card">
    <div class="title">Node 1 (ACTIVE)</div>

    <button onclick="toggleView(1)">Toggle View</button>

    <div class="values">
      <div class="value">Temp <span id="n1-temp">--</span></div>
      <div class="value">Hum <span id="n1-hum">--</span></div>
      <div class="value">Water Level <span id="n1-water">--</span></div>
    </div>

    <div id="node1-graph">
      <canvas id="chart1"></canvas>
    </div>

    <div id="node1-gauge" style="display:none;">
      <canvas id="gauge1"></canvas>
    </div>
  </div>

  <!-- NODE 2 -->
  <div class="card">
    <div class="title">Node 2</div>
    <button onclick="toggleView(2)">Toggle View</button>

    <div class="values">
      <div class="value">Temp <span id="n2-temp">--</span></div>
      <div class="value">Hum <span id="n2-hum">--</span></div>
      <div class="value">Water Level <span id="n2-water">--</span></div>
    </div>

    <div id="node2-graph"><canvas id="chart2"></canvas></div>
    <div id="node2-gauge" style="display:none;"><canvas id="gauge2"></canvas></div>
  </div>

  <!-- NODE 3 -->
  <div class="card">
    <div class="title">Node 3</div>
    <button onclick="toggleView(3)">Toggle View</button>

    <div class="values">
      <div class="value">Temp <span id="n3-temp">--</span></div>
      <div class="value">Hum <span id="n3-hum">--</span></div>
      <div class="value">Water Level <span id="n3-water">--</span></div>
    </div>

    <div id="node3-graph"><canvas id="chart3"></canvas></div>
    <div id="node3-gauge" style="display:none;"><canvas id="gauge3"></canvas></div>
  </div>

  <!-- NODE 4 -->
  <div class="card">
    <div class="title">Node 4</div>
    <button onclick="toggleView(4)">Toggle View</button>

    <div class="values">
      <div class="value">Temp <span id="n4-temp">--</span></div>
      <div class="value">Hum <span id="n4-hum">--</span></div>
      <div class="value">Water Level <span id="n4-water">--</span></div>
    </div>

    <div id="node4-graph"><canvas id="chart4"></canvas></div>
    <div id="node4-gauge" style="display:none;"><canvas id="gauge4"></canvas></div>
  </div>

</div>

<script>
const topic = "esp32/dht22";
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

let viewState = {1:"graph",2:"graph",3:"graph",4:"graph"};

function toggleView(node){
  const graph = document.getElementById(`node${node}-graph`);
  const gauge = document.getElementById(`node${node}-gauge`);

  if(viewState[node] === "graph"){
    graph.style.display = "none";
    gauge.style.display = "block";
    viewState[node] = "gauge";
  } else {
    graph.style.display = "block";
    gauge.style.display = "none";
    viewState[node] = "graph";
  }
}

// Node 1 data
const labels1 = [];
const temp1 = [];
const hum1 = [];

// Create chart
function createChart(id, tData, hData, labels){
  return new Chart(document.getElementById(id), {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        { data: tData, borderColor:"#e74c3c", tension:0.3, borderWidth:2 },
        { data: hData, borderColor:"#3498db", tension:0.3, borderWidth:2 }
      ]
    },
    options: {
      responsive:false,
      plugins:{ legend:{display:false}},
      scales:{
        x:{ display:false },
        y:{
          display:true,
          grid:{ color:"rgba(255,255,255,0.1)" },
          ticks:{ color:"#ccc", font:{size:10}}
        }
      }
    }
  });
}

// Create gauge
function createGauge(id){
  return new Chart(document.getElementById(id), {
    type: "doughnut",
    data: {
      datasets: [{
        data: [0,100],
        backgroundColor: ["#e74c3c","#444"],
        borderWidth:0
      }]
    },
    options:{
      rotation:-90,
      circumference:180,
      cutout:"70%",
      plugins:{legend:{display:false}}
    }
  });
}

// Charts
const chart1 = createChart("chart1", temp1, hum1, labels1);
createChart("chart2", [], [], []);
createChart("chart3", [], [], []);
createChart("chart4", [], [], []);

// Gauges
const gauge1 = createGauge("gauge1");
createGauge("gauge2");
createGauge("gauge3");
createGauge("gauge4");

// MQTT
client.on("connect", ()=>{
  document.getElementById("status").innerText="✅ Connected";
  client.subscribe(topic);
});

client.on("message",(topic,message)=>{
  try{
    const data = JSON.parse(message.toString());
    const temp = data.temp;
    const hum = data.hum;

    document.getElementById("n1-temp").innerText=temp+"°C";
    document.getElementById("n1-hum").innerText=hum+"%";

    const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    labels1.push(time);
    temp1.push(temp);
    hum1.push(hum);

    if(labels1.length>7){
      labels1.shift();
      temp1.shift();
      hum1.shift();
    }

    chart1.update();

    // Update gauge
    gauge1.data.datasets[0].data = [temp, 50-temp];
    gauge1.update();

  }catch(e){
    document.getElementById("status").innerText="⚠️ Invalid Data";
  }
});

client.on("error",()=>document.getElementById("status").innerText="❌ Error");
client.on("reconnect",()=>document.getElementById("status").innerText="🔄 Reconnecting...");
</script>

</body>
</html>
