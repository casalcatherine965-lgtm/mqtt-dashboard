<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AWD Monitoring Dashboard</title>

<!-- MQTT -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #1f253d;
  color: #fff;
  text-align: center;
}

h1 { padding: 15px; margin: 0; }
.status { margin-bottom: 10px; font-weight: bold; }

.container {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 20px;
}

.card {
  background: #2c3246;
  border-radius: 10px;
  padding: 15px;
  width: 750px;
  display: flex;
  gap: 20px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.3);
}

.left-panel {
  flex: 2;
}

.right-panel {
  flex: 0 0 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: space-between;
}

.values {
  display: flex;
  justify-content: space-around;
  margin-bottom: 10px;
}

.value span {
  display: block;
  font-size: 1.4em;
  font-weight: bold;
}

/* Water bar */
.water-bar-container {
  position: relative;
  width: 20px;
  background: #333;
  border: 2px solid #555;
  border-radius: 5px;
  overflow: hidden;
  flex: 1; /* match height of left panel */
  display: flex;
  flex-direction: column-reverse;
}

.water-bar {
  width: 100%;
  height: 0%;
  transition: height 0.5s ease;
}

.water-labels {
  position: absolute;
  left: 25px;
  top: 0;
  bottom: 0;
  display: flex;
  flex-direction: column-reverse;
  justify-content: space-between;
  font-size: 0.8em;
  color: #fff;
}
</style>
</head>
<body>

<h1>🌾 AWD Monitoring Dashboard</h1>
<div class="status">Status: <span id="status">Connecting...</span></div>

<div class="container">
  <div class="card">
    <div class="left-panel">
      <h3>Node 1</h3>
      <div class="values">
        <div class="value">Temp <span id="temp">--</span>°C</div>
        <div class="value">Hum <span id="hum">--</span>%</div>
        <div class="value">Water <span id="water">--</span> cm</div>
      </div>
      <canvas id="chart"></canvas>
    </div>

    <div class="right-panel">
      <h4>Water Level</h4>
      <div class="water-bar-container">
        <div id="waterBar" class="water-bar"></div>
        <div class="water-labels" id="waterLabels"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSyCvoSR-oFO_W-1iyiY5Y7PqBoA94HB9Fuo",
  authDomain: "databaseawd.firebaseapp.com",
  databaseURL: "https://databaseawd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "databaseawd",
  storageBucket: "databaseawd.firebasestorage.app",
  messagingSenderId: "261523660331",
  appId: "1:261523660331:web:6225e6bb71b5555c31546e",
  measurementId: "G-95ZLFJ4649"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== MQTT =====
const client = mqtt.connect("wss://1956694161de4eb899ebb06b4935709e.s1.eu.hivemq.cloud:8884/mqtt", {
  username: "catherine",
  password: "Catherine1"
});

client.on("connect", ()=>{
  document.getElementById("status").innerText="✅ Connected";
  client.subscribe("esp32/dht22");
});

// ===== GRAPH =====
const labels=[], tempData=[], humData=[];
const chart = new Chart(document.getElementById("chart"),{
  type:"line",
  data:{
    labels,
    datasets:[
      {label:"Temp (°C)", data:tempData, borderColor:"#e74c3c", fill:true, yAxisID:"y1"},
      {label:"Hum (%)", data:humData, borderColor:"#3498db", fill:true, yAxisID:"y2"}
    ]
  },
  options:{
    responsive:true,
    animation:{duration:500},
    scales:{
      y1:{min:0,max:50,ticks:{stepSize:10}},
      y2:{position:"right",min:0,max:100,ticks:{stepSize:10}}
    }
  }
});

// ===== WATER BAR =====
const waterBar = document.getElementById("waterBar");
const waterLabels = document.getElementById("waterLabels");
const MAX_WATER = 60; // cm

// Add labels
for(let i=0;i<=MAX_WATER;i+=10){
  const span = document.createElement("span");
  span.innerText = i;
  waterLabels.prepend(span);
}

function updateWaterBar(value){
  const percent = Math.min(Math.max(value,0)/MAX_WATER,1);
  waterBar.style.height = (percent*100)+"%";

  if(percent<0.5) waterBar.style.backgroundColor="#2ecc71"; // green
  else if(percent<0.8) waterBar.style.backgroundColor="#f1c40f"; // yellow
  else waterBar.style.backgroundColor="#e74c3c"; // red
}

// ===== DATA FLOW =====
client.on("message",(topic,msg)=>{
  try{
    const data=JSON.parse(msg.toString());
    const temp=data.temp;
    const hum=data.hum;
    const water=data.water;

    document.getElementById("temp").innerText=temp.toFixed(1);
    document.getElementById("hum").innerText=hum.toFixed(1);
    document.getElementById("water").innerText=water.toFixed(1);

    const t=new Date();
    const timeLabel = t.getHours()+":"+("0"+t.getMinutes()).slice(-2);
    labels.push(timeLabel);
    tempData.push(temp);
    humData.push(hum);

    if(labels.length>7){
      labels.shift();
      tempData.shift();
      humData.shift();
    }
    chart.update();

    updateWaterBar(water);

    db.ref("node1/latest").set({temp, hum, water, time: Date.now()});
    db.ref("node1/history").push({temp, hum, water, time: timeLabel});

  } catch(e){
    console.error("Invalid MQTT message:", msg.toString());
  }
});
</script>

</body>
</html>
