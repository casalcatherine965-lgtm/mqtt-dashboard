<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DHT22 IoT Dashboard</title>

  <!-- MQTT -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- JustGage for gauges -->
  <script src="https://cdn.jsdelivr.net/npm/justgage"></script>
  <script src="https://cdn.jsdelivr.net/npm/raphael"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #1f253d;
      color: #fff;
    }

    h1 {
      text-align: center;
      padding: 20px 0 10px;
      margin: 0;
      font-size: 1.8em;
      color: #fff;
    }

    .status {
      text-align: center;
      margin-bottom: 20px;
      font-weight: bold;
      color: #f1c40f;
    }

    .cards {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 30px;
    }

    .card {
      background: #2c3246;
      border-radius: 12px;
      width: 200px;
      padding: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      text-align: center;
    }

    .card .label {
      font-size: 0.9em;
      color: #bbb;
    }

    .card .value {
      font-size: 2em;
      margin-top: 10px;
      color: #fff;
    }

    .gauges {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    .gauge {
      width: 180px;
      height: 120px;
      background: #2c3246;
      border-radius: 12px;
      padding: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    .chart-container {
      width: 90%;
      max-width: 800px;
      margin: auto;
      background: #2c3246;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    }

    canvas {
      background: #2c3246;
      border-radius: 12px;
    }
  </style>
</head>
<body>

<h1>🌡️ DHT22 Dashboard</h1>
<div class="status">Status: <span id="status">Connecting...</span></div>

<!-- KPI Cards -->
<div class="cards">
  <div class="card">
    <div class="label">Temperature</div>
    <div class="value" id="temperature">-- °C</div>
  </div>
  <div class="card">
    <div class="label">Humidity</div>
    <div class="value" id="humidity">-- %</div>
  </div>
</div>

<!-- Gauges -->
<div class="gauges">
  <div class="gauge" id="tempGauge"></div>
  <div class="gauge" id="humGauge"></div>
</div>

<!-- Trend Chart -->
<div class="chart-container">
  <canvas id="trendChart"></canvas>
</div>

<script>
  const topic = "esp32/dht22";
  const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

  const labels = [];
  const tempData = [];
  const humData = [];

  // ----------------------
  // JustGage Gauges
  // ----------------------
  const tempGauge = new JustGage({
    id: "tempGauge",
    value: 0,
    min: 0,
    max: 50,
    title: "Temp (°C)",
    levelColors: ["#3498db", "#f1c40f", "#e74c3c"],
    pointer: true,
    gaugeWidthScale: 0.6,
    counter: true,
    relativeGaugeSize: true
  });

  const humGauge = new JustGage({
    id: "humGauge",
    value: 0,
    min: 0,
    max: 100,
    title: "Humidity (%)",
    levelColors: ["#e74c3c", "#f1c40f", "#3498db"],
    pointer: true,
    gaugeWidthScale: 0.6,
    counter: true,
    relativeGaugeSize: true
  });

  // ----------------------
  // Trend Chart
  // ----------------------
  const ctx = document.getElementById("trendChart").getContext("2d");
  const trendChart = new Chart(ctx, {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        {
          label: "Temperature (°C)",
          data: tempData,
          borderColor: "#e74c3c",
          backgroundColor: "rgba(231,76,60,0.2)",
          tension: 0.3,
          fill: true
        },
        {
          label: "Humidity (%)",
          data: humData,
          borderColor: "#3498db",
          backgroundColor: "rgba(52,152,219,0.2)",
          tension: 0.3,
          fill: true
        }
      ]
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: "#fff" } },
        tooltip: { mode: 'index', intersect: false }
      },
      scales: {
        x: { ticks: { color: "#fff" }, grid: { color: "#444" } },
        y: { ticks: { color: "#fff" }, grid: { color: "#444" } }
      }
    }
  });

  // ----------------------
  // MQTT Events
  // ----------------------
  client.on("connect", () => {
    document.getElementById("status").innerText = "✅ Connected";
    client.subscribe(topic);
  });

  client.on("message", (topic, message) => {
    try {
      const data = JSON.parse(message.toString());
      const temp = data.temp;
      const hum = data.hum;

      document.getElementById("temperature").innerText = temp + " °C";
      document.getElementById("humidity").innerText = hum + " %";

      tempGauge.refresh(temp);
      humGauge.refresh(hum);

      const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      labels.push(time);
      tempData.push(temp);
      humData.push(hum);

      if(labels.length > 20){
        labels.shift();
        tempData.shift();
        humData.shift();
      }

      trendChart.update();
    } catch(e){
      document.getElementById("status").innerText = "⚠️ Invalid Data";
    }
  });

  client.on("error", () => document.getElementById("status").innerText = "❌ Error");
  client.on("reconnect", () => document.getElementById("status").innerText = "🔄 Reconnecting...");
</script>

</body>
</html>
