<!DOCTYPE html>
<html>
<head>
  <title>ESP32 DHT22 Dashboard</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <h2>ESP32 DHT22 Dashboard</h2>
  <canvas id="chart"></canvas>

  <script>
    const socket = io();
    const ctx = document.getElementById('chart').getContext('2d');

    const chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: [],
        datasets: [
          { label: 'Temperature (°C)', borderColor: 'red', data: [] },
          { label: 'Humidity (%)', borderColor: 'blue', data: [] }
        ]
      }
    });

    socket.on('sensorData', data => {
      const time = new Date().toLocaleTimeString();
      chart.data.labels.push(time);
      chart.data.datasets[0].data.push(data.temp);
      chart.data.datasets[1].data.push(data.hum);

      if (chart.data.labels.length > 20) {
        chart.data.labels.shift();
        chart.data.datasets.forEach(ds => ds.data.shift());
      }

      chart.update();
    });
  </script>
</body>
</html>
