<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DHT22 Live Dashboard</title>
  <script src="https://unpkg.com/paho-mqtt/mqttws31.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 50px;
      background: #f0f4f8;
    }
    h1 {
      color: #333;
    }
    .reading {
      font-size: 2em;
      margin: 20px 0;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      display: inline-block;
      min-width: 200px;
    }
  </style>
</head>
<body>
  <h1>DHT22 Live Sensor Dashboard</h1>
  <div class="reading">
    Temperature: <span id="temperature">--</span> °C
  </div>
  <div class="reading">
    Humidity: <span id="humidity">--</span> %
  </div>

  <script>
    // Connect to HiveMQ public broker using WebSocket
    var client = new Paho.MQTT.Client("broker.hivemq.com", 8000, "webclient_" + Math.random());

    client.onConnectionLost = function(responseObject) {
      console.log("Connection lost: " + responseObject.errorMessage);
      setTimeout(connectMQTT, 3000);
    };

    client.onMessageArrived = function(message) {
      try {
        var data = JSON.parse(message.payloadString);

        // Adjusted to match ESP32 JSON fields
        document.getElementById("temperature").innerText = data.temp;
        document.getElementById("humidity").innerText = data.hum;
      } catch (e) {
        console.error("Invalid JSON: ", message.payloadString);
      }
    };

    function connectMQTT() {
      client.connect({
        onSuccess: function() {
          console.log("Connected to HiveMQ");
          client.subscribe("esp32/dht22");
        },
        onFailure: function(err) {
          console.error("Connection failed: ", err);
          setTimeout(connectMQTT, 3000);
        }
      });
    }

    connectMQTT();
  </script>
</body>
</html>
