<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DHT22 Live Dashboard</title>

  <!-- ✅ Stable MQTT Library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.1.0/mqttws31.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 50px;
      background: #f0f4f8;
    }
    h1 { color: #333; }

    .reading {
      font-size: 2em;
      margin: 20px 0;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      display: inline-block;
      min-width: 200px;
    }

    .status {
      margin-top: 20px;
      font-size: 1.2em;
    }
  </style>
</head>

<body>
  <h1>DHT22 Live Sensor Dashboard</h1>

  <div class="reading">
    Temperature: <span id="temperature">--</span> °C
  </div>

  <div class="reading">
    Humidity: <span id="humidity">--</span> %
  </div>

  <!-- ✅ Debug Info -->
  <div class="status">
    Status: <span id="status">Connecting...</span><br>
    Last Message: <span id="lastmsg">None</span>
  </div>

  <script>
    const topic = "esp32/dht22";

    // ✅ Correct WebSocket connection
    const client = new Paho.MQTT.Client(
      "broker.hivemq.com",
      8884,
      "/mqtt",
      "webclient_" + Date.now()
    );

    // 🔌 When connection is lost
    client.onConnectionLost = function(responseObject) {
      document.getElementById("status").innerText = "❌ Disconnected";
      setTimeout(connectMQTT, 3000);
    };

    // 📩 When message arrives
    client.onMessageArrived = function(message) {
      document.getElementById("lastmsg").innerText = message.payloadString;

      try {
        const data = JSON.parse(message.payloadString);

        document.getElementById("temperature").innerText = data.temp ?? "--";
        document.getElementById("humidity").innerText = data.hum ?? "--";

      } catch (e) {
        document.getElementById("status").innerText = "⚠️ Invalid JSON";
      }
    };

    // 🔗 Connect function
    function connectMQTT() {
      client.connect({
        useSSL: true,
        cleanSession: true,
        timeout: 5,

        onSuccess: function () {
          document.getElementById("status").innerText = "✅ Connected";
          client.subscribe(topic);
        },

        onFailure: function (err) {
          document.getElementById("status").innerText = "❌ Connection Failed";
          setTimeout(connectMQTT, 5000);
        }
      });
    }

    // 🚀 Start connection
    connectMQTT();
  </script>
</body>
</html>
