<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AWD Monitoring Dashboard</title>

<!-- MQTT -->
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #1f253d;
  color: #fff;
  text-align: center;
}

h1 { padding: 15px; margin: 0; }
.status { margin-bottom: 10px; font-weight: bold; }

.card {
  background: #2c3246;
  border-radius: 10px;
  padding: 12px;
  margin: 15px auto;
  box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  max-width: 900px;
}

.values {
  display: flex;
  justify-content: space-around;
  margin-bottom: 10px;
}

.value span {
  display: block;
  font-size: 1.4em;
  font-weight: bold;
}

/* Graph containers */
.graphs {
  display: flex;
  justify-content: space-around;
  flex-wrap: wrap;
  gap: 20px;
}

canvas {
  background: #2c3246;
  border-radius: 10px;
  padding: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.3);
}

/* Water level vertical bar */
.water-container {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  height: 250px;
  margin-top: 20px;
}

.water-bar {
  position: relative;
  width: 60px;
  height: 100%;
  background: #444;
  border-radius: 8px;
  margin: 0 20px;
  overflow: hidden;
}

.water-fill {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 0%;
  transition: height 0.5s ease;
}

.water-labels {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  margin-left: 10px;
  height: 250px;
}

.water-labels span {
  font-size: 0.8em;
}
</style>
</head>
<body>

<h1>🌾 AWD Monitoring Dashboard</h1>
<div class="status">Status: <span id="status">Connecting...</span></div>

<div class="card">
  <h3>Node 1</h3>
  <div class="values">
    <div class="value">Temp <span id="temp">-- °C</span></div>
    <div class="value">Hum <span id="hum">-- %</span></div>
  </div>

  <div class="graphs">
    <canvas id="tempChart" width="400" height="200"></canvas>
    <canvas id="humChart" width="400" height="200"></canvas>
  </div>

  <div class="water-container">
    <div class="water-bar">
      <div id="waterFill" class="water-fill"></div>
    </div>
    <div class="water-labels">
      <span>60 cm</span>
      <span>50 cm</span>
      <span>40 cm</span>
      <span>30 cm</span>
      <span>20 cm</span>
      <span>10 cm</span>
      <span>0 cm</span>
    </div>
  </div>
</div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "AIzaSyCvoSR-oFO_W-1iyiY5Y7PqBoA94HB9Fuo",
  authDomain: "databaseawd.firebaseapp.com",
  databaseURL: "https://databaseawd-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "databaseawd",
  storageBucket: "databaseawd.firebasestorage.app",
  messagingSenderId: "261523660331",
  appId: "1:261523660331:web:6225e6bb71b5555c31546e",
  measurementId: "G-95ZLFJ4649"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= MQTT =================
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");
client.on("connect", ()=>{
  document.getElementById("status").innerText="✅ Connected";
  client.subscribe("esp32/dht22");
});

// ================= GRAPH DATA =================
const tempLabels=[], tempData=[];
const humLabels=[], humData=[];

// Temp Chart
const tempChart = new Chart(document.getElementById("tempChart"), {
  type:"line",
  data:{ labels: tempLabels, datasets:[{
    label:"Temperature (°C)",
    data: tempData,
    borderColor:"#e74c3c",
    backgroundColor:"rgba(231,76,60,0.2)",
    tension:0.3,
    fill:true
  }]},
  options:{ scales:{ y:{ min:0, max:50, ticks:{ stepSize:10 } } } }
});

// Hum Chart
const humChart = new Chart(document.getElementById("humChart"), {
  type:"line",
  data:{ labels: humLabels, datasets:[{
    label:"Humidity (%)",
    data: humData,
    borderColor:"#3498db",
    backgroundColor:"rgba(52,152,219,0.2)",
    tension:0.3,
    fill:true
  }]},
  options:{ scales:{ y:{ min:0, max:100, ticks:{ stepSize:10 } } } }
});

// ================= DATA FLOW =================
client.on("message",(topic,msg)=>{
  const data = JSON.parse(msg.toString());
  const temp = data.temp || 0;
  const hum = data.hum || 0;
  const water = data.water || 0;

  // Update UI
  document.getElementById("temp").innerText=temp.toFixed(1)+" °C";
  document.getElementById("hum").innerText=hum.toFixed(1)+" %";

  // Graph
  const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
  tempLabels.push(time); tempData.push(temp);
  humLabels.push(time); humData.push(hum);
  if(tempLabels.length>7){ tempLabels.shift(); tempData.shift(); humLabels.shift(); humData.shift(); }

  tempChart.update();
  humChart.update();

  // Water level bar with gradient
  const maxLevel = 60; // 60 cm
  const percent = Math.min((water/maxLevel)*100,100);
  const bar = document.getElementById("waterFill");

  let color = "#2ecc71"; // green
  if(water>45) color="#e74c3c"; // red
  else if(water>30) color="#f1c40f"; // yellow

  bar.style.height = percent+"%";
  bar.style.background = color;

  // ================= SAVE TO FIREBASE =================
  db.ref("node1/latest").set({ temp, hum, water, time: Date.now() });
  db.ref("node1/history").push({ temp, hum, water, time: new Date().toLocaleString() });
});
</script>
</body>
</html>
