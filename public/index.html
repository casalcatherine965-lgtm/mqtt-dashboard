<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DHT22 IoT Dashboard</title>

  <!-- MQTT -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #eef2f7;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin-bottom: 10px;
    }

    .status {
      margin-bottom: 20px;
      font-weight: bold;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 12px;
      width: 220px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .value {
      font-size: 2em;
      margin-top: 10px;
    }

    /* 👇 Charts container */
    .charts {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    canvas {
      background: white;
      border-radius: 12px;
      padding: 10px;
      width: 350px !important;
      height: 250px !important;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
  </style>
</head>

<body>

  <h1>🌡️ DHT22 IoT Monitoring Dashboard</h1>
  <div class="status">Status: <span id="status">Connecting...</span></div>

  <div class="container">
    <div class="card">
      Temperature
      <div class="value" id="temperature">-- °C</div>
    </div>

    <div class="card">
      Humidity
      <div class="value" id="humidity">-- %</div>
    </div>
  </div>

  <!-- 👇 Smaller Charts -->
  <div class="charts">
    <canvas id="tempChart"></canvas>
    <canvas id="humChart"></canvas>
  </div>

  <script>
    const topic = "esp32/dht22";

    const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

    const labels = [];
    const tempData = [];
    const humData = [];

    // 🌡️ Temperature Chart (RED)
    const tempChart = new Chart(document.getElementById("tempChart"), {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          label: "Temperature (°C)",
          data: tempData,
          borderColor: "#e74c3c",
          backgroundColor: "rgba(231,76,60,0.2)",
          borderWidth: 2,
          tension: 0.3,
          fill: true
        }]
      }
    });

    // 💧 Humidity Chart (BLUE)
    const humChart = new Chart(document.getElementById("humChart"), {
      type: "line",
      data: {
        labels: labels,
        datasets: [{
          label: "Humidity (%)",
          data: humData,
          borderColor: "#3498db",
          backgroundColor: "rgba(52,152,219,0.2)",
          borderWidth: 2,
          tension: 0.3,
          fill: true
        }]
      }
    });

    client.on("connect", () => {
      document.getElementById("status").innerText = "✅ Connected";
      client.subscribe(topic);
    });

    client.on("message", (topic, message) => {
      try {
        const data = JSON.parse(message.toString());

        const temp = data.temp;
        const hum = data.hum;

        document.getElementById("temperature").innerText = temp + " °C";
        document.getElementById("humidity").innerText = hum + " %";

        const time = new Date().toLocaleTimeString();

        labels.push(time);
        tempData.push(temp);
        humData.push(hum);

        if (labels.length > 20) {
          labels.shift();
          tempData.shift();
          humData.shift();
        }

        tempChart.update();
        humChart.update();

      } catch (e) {
        document.getElementById("status").innerText = "⚠️ Invalid Data";
      }
    });

    client.on("error", () => {
      document.getElementById("status").innerText = "❌ Error";
    });

    client.on("reconnect", () => {
      document.getElementById("status").innerText = "🔄 Reconnecting...";
    });
  </script>

</body>
</html>
