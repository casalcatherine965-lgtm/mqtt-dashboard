<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DHT22 Live Dashboard</title>

  <!-- ✅ MQTT.js (WORKS on Render) -->
  <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      padding: 50px;
      background: #f0f4f8;
    }

    .reading {
      font-size: 2em;
      margin: 20px;
      padding: 20px;
      background: #fff;
      border-radius: 10px;
      display: inline-block;
      min-width: 200px;
    }

    .status {
      margin-top: 20px;
      font-size: 1.2em;
    }
  </style>
</head>

<body>
  <h1>DHT22 Live Sensor Dashboard</h1>

  <div class="reading">
    Temperature: <span id="temperature">--</span> °C
  </div>

  <div class="reading">
    Humidity: <span id="humidity">--</span> %
  </div>

  <div class="status">
    Status: <span id="status">Connecting...</span><br>
    Last Message: <span id="lastmsg">None</span>
  </div>

  <script>
    const topic = "esp32/dht22";

    // ✅ Connect using MQTT.js over WSS
    const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

    client.on("connect", () => {
      document.getElementById("status").innerText = "✅ Connected";
      client.subscribe(topic);
    });

    client.on("message", (topic, message) => {
      const msg = message.toString();
      document.getElementById("lastmsg").innerText = msg;

      try {
        const data = JSON.parse(msg);
        document.getElementById("temperature").innerText = data.temp ?? "--";
        document.getElementById("humidity").innerText = data.hum ?? "--";
      } catch (e) {
        document.getElementById("status").innerText = "⚠️ Invalid JSON";
      }
    });

    client.on("error", () => {
      document.getElementById("status").innerText = "❌ Connection Error";
    });

    client.on("reconnect", () => {
      document.getElementById("status").innerText = "🔄 Reconnecting...";
    });
  </script>
</body>
</html>
