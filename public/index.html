<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DHT22 Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body { font-family:'Segoe UI', sans-serif; background:#1f253d; color:#fff; text-align:center; margin:0; padding:10px;}
h1{margin:10px;font-size:1.5em;}
.status{font-weight:bold; margin-bottom:10px;}
.card{background:#2c3246; border-radius:10px; padding:10px; margin:10px auto; max-width:500px;}
.values{display:flex; justify-content:space-around; margin-bottom:10px;}
.value span{display:block; font-size:1.4em; font-weight:bold;}
.gauges{display:flex; justify-content:space-around; margin-top:10px;}
.gauge-box{width:45%;}
canvas{width:100% !important;height:160px !important;}
.needle{position:absolute;width:2px;height:70px;background:white;transform-origin:bottom;top:20px;left:50%;margin-left:-1px;}
.gauge-wrapper{position:relative;}
</style>
</head>
<body>

<h1>🌡️ DHT22 Dashboard</h1>
<div class="status">Status: <span id="status">Connecting...</span></div>

<div class="card">
  <div class="values">
    <div class="value">Temp <span id="temp">--</span>°C</div>
    <div class="value">Hum <span id="hum">--</span>%</div>
  </div>

  <canvas id="chart"></canvas>

  <div class="gauges">
    <div class="gauge-box gauge-wrapper">
      <canvas id="gTemp"></canvas>
      <div class="needle" id="nTemp"></div>
    </div>
    <div class="gauge-box gauge-wrapper">
      <canvas id="gHum"></canvas>
      <div class="needle" id="nHum"></div>
    </div>
  </div>
</div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ================= MQTT =================
const client = mqtt.connect("wss://1956694161de4eb899ebb06b4935709e.s1.eu.hivemq.cloud:8884/mqtt", {
  username: "catherine",
  password: "Catherine1"
});

client.on("connect", ()=>{
  document.getElementById("status").innerText="✅ Connected";
  client.subscribe("esp32/dht22");
});

// ================= GRAPH =================
const labels=[], tempData=[], humData=[];
const chart = new Chart(document.getElementById("chart"), {
  type:"line",
  data:{ labels, datasets:[
    {label:"Temp (°C)", data:tempData, borderColor:"#e74c3c", backgroundColor:"rgba(231,76,60,0.2)", fill:true, yAxisID:"y1"},
    {label:"Hum (%)", data:humData, borderColor:"#3498db", backgroundColor:"rgba(52,152,219,0.2)", fill:true, yAxisID:"y2"}
  ]},
  options:{ responsive:true,
    scales:{ y1:{min:0,max:50,ticks:{stepSize:10}}, y2:{position:"right",min:0,max:100,ticks:{stepSize:10}} }
  }
});

// ================= SIMPLE NEEDLE GAUGES =================
function createGauge(ctx, max){
  return new Chart(ctx,{
    type:"doughnut",
    data:{datasets:[{data:[0,max], backgroundColor:["#e74c3c","#444"]}]},
    options:{rotation:-90, circumference:180, cutout:"70%", plugins:{legend:{display:false}}}
  });
}

const gTemp = createGauge(document.getElementById("gTemp"),50);
const gHum  = createGauge(document.getElementById("gHum"),100);

function updateNeedle(needleId,value,max){
  const angle = (value/max)*180 - 90;
  document.getElementById(needleId).style.transform = `rotate(${angle}deg)`;
}

// ================= DATA FLOW =================
client.on("message",(topic,msg)=>{
  const data = JSON.parse(msg.toString());
  const temp = data.temp;
  const hum  = data.hum;

  // Update text
  document.getElementById("temp").innerText = temp.toFixed(1);
  document.getElementById("hum").innerText = hum.toFixed(1);

  // Update graph
  const t = new Date().toLocaleTimeString();
  labels.push(t); tempData.push(temp); humData.push(hum);
  if(labels.length>7){ labels.shift(); tempData.shift(); humData.shift(); }
  chart.update();

  // Update gauges
  gTemp.data.datasets[0].data=[temp,50-temp];
  gHum.data.datasets[0].data=[hum,100-hum];
  gTemp.update();
  gHum.update();

  updateNeedle("nTemp",temp,50);
  updateNeedle("nHum",hum,100);

  // Firebase
  db.ref("node1/latest").set({ temp, hum, time: Date.now() });
  db.ref("node1/history").push({ temp, hum, time: new Date().toLocaleString() });
});
</script>

</body>
</html>
