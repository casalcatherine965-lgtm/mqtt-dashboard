<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AWD Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #1f253d;
  color: #fff;
  text-align: center;
}

h1 { padding: 15px; margin: 0; }

.status { margin-bottom: 10px; font-weight: bold; }

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.card {
  background: #2c3246;
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.3);
}

.title {
  font-size: 1em;
  margin-bottom: 5px;
}

.active-badge {
  font-size: 0.7em;
  color: #2ecc71;
}

.values {
  display: flex;
  justify-content: space-around;
  font-size: 0.85em;
}

.value span {
  display: block;
  font-size: 1.2em;
  font-weight: bold;
}

canvas {
  margin-top: 8px;
  width: 100% !important;
  height: 120px !important;
}
</style>
</head>

<body>

<h1>🌾 AWD Monitoring Dashboard</h1>
<div class="status">Status: <span id="status">Connecting...</span></div>

<div class="grid">

  <!-- NODE 1 -->
  <div class="card">
    <div class="title">Node 1 <span class="active-badge">(ACTIVE)</span></div>
    <div class="values">
      <div class="value">Temp <span id="n1-temp">--</span></div>
      <div class="value">Hum <span id="n1-hum">--</span></div>
      <div class="value">Water <span id="n1-water">--</span></div>
    </div>
    <canvas id="chart1"></canvas>
  </div>

  <!-- NODE 2 -->
  <div class="card">
    <div class="title">Node 2</div>
    <div class="values">
      <div class="value">Temp <span id="n2-temp">--</span></div>
      <div class="value">Hum <span id="n2-hum">--</span></div>
      <div class="value">Water <span id="n2-water">--</span></div>
    </div>
    <canvas id="chart2"></canvas>
  </div>

  <!-- NODE 3 -->
  <div class="card">
    <div class="title">Node 3</div>
    <div class="values">
      <div class="value">Temp <span id="n3-temp">--</span></div>
      <div class="value">Hum <span id="n3-hum">--</span></div>
      <div class="value">Water <span id="n3-water">--</span></div>
    </div>
    <canvas id="chart3"></canvas>
  </div>

  <!-- NODE 4 -->
  <div class="card">
    <div class="title">Node 4</div>
    <div class="values">
      <div class="value">Temp <span id="n4-temp">--</span></div>
      <div class="value">Hum <span id="n4-hum">--</span></div>
      <div class="value">Water <span id="n4-water">--</span></div>
    </div>
    <canvas id="chart4"></canvas>
  </div>

</div>

<script>
const topic = "esp32/dht22";
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

// Data arrays (Node 1 only for now)
const labels1 = [];
const temp1 = [];
const hum1 = [];

// Create charts for all nodes
function createChart(canvasId, tempData, humData, labels){
  return new Chart(document.getElementById(canvasId), {
    type: "line",
    data: {
      labels: labels,
      datasets: [
        { data: tempData, borderColor: "#e74c3c", tension: 0.3 },
        { data: humData, borderColor: "#3498db", tension: 0.3 }
      ]
    },
    options: {
      responsive: false,
      plugins: { legend: { display: false }},
      scales: { x: { display: false }, y: { display: false }}
    }
  });
}

// Charts
const chart1 = createChart("chart1", temp1, hum1, labels1);
const chart2 = createChart("chart2", [], [], []);
const chart3 = createChart("chart3", [], [], []);
const chart4 = createChart("chart4", [], [], []);

client.on("connect", () => {
  document.getElementById("status").innerText = "✅ Connected";
  client.subscribe(topic);
});

client.on("message", (topic, message) => {
  try {
    const data = JSON.parse(message.toString());

    const temp = data.temp;
    const hum = data.hum;

    // Update Node 1 only
    document.getElementById("n1-temp").innerText = temp + "°C";
    document.getElementById("n1-hum").innerText = hum + "%";

    const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    labels1.push(time);
    temp1.push(temp);
    hum1.push(hum);

    if(labels1.length > 7){
      labels1.shift();
      temp1.shift();
      hum1.shift();
    }

    chart1.update();

  } catch(e){
    document.getElementById("status").innerText = "⚠️ Invalid Data";
  }
});

client.on("error", () => document.getElementById("status").innerText = "❌ Error");
client.on("reconnect", () => document.getElementById("status").innerText = "🔄 Reconnecting...");
</script>

</body>
</html>
