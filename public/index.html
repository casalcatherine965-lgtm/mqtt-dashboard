<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AWD Dashboard</title>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #1f253d;
  color: #fff;
  text-align: center;
}

h1 { padding: 15px; margin: 0; }
.status { margin-bottom: 10px; font-weight: bold; }

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 15px;
  padding: 15px;
}

.card {
  background: #2c3246;
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  min-height: 260px;
}

.title { font-size: 1em; margin-bottom: 5px; }

button {
  background: #3498db;
  border: none;
  padding: 5px 10px;
  border-radius: 6px;
  color: white;
  cursor: pointer;
  margin-bottom: 5px;
}

.values {
  display: flex;
  justify-content: space-around;
  font-size: 0.85em;
  margin-bottom: 5px;
}

.value span {
  display: block;
  font-size: 1.2em;
  font-weight: bold;
}

/* Gauges layout */
.gauges {
  display: flex;
  justify-content: space-between;
  gap: 8px;
}

.gauge-box {
  width: 30%;
  height: 120px;
}

canvas {
  width: 100% !important;
  height: auto !important;
}
</style>
</head>

<body>

<h1>🌾 AWD Monitoring Dashboard</h1>
<div class="status">Status: <span id="status">Connecting...</span></div>

<div class="grid">

  <!-- NODE 1 -->
  <div class="card">
    <div class="title">Node 1 (ACTIVE)</div>
    <button onclick="toggleView(1)">Toggle View</button>
    <div class="values">
      <div class="value">Temp <span id="n1-temp">--</span></div>
      <div class="value">Hum <span id="n1-hum">--</span></div>
      <div class="value">Water Level <span id="n1-water">--</span></div>
    </div>

    <!-- GRAPH -->
    <div id="node1-graph" style="height:160px;">
      <canvas id="chart1"></canvas>
    </div>

    <!-- GAUGES -->
    <div id="node1-gauge" style="display:none;">
      <div class="gauges">
        <div class="gauge-box"><canvas id="gauge-temp"></canvas></div>
        <div class="gauge-box"><canvas id="gauge-hum"></canvas></div>
        <div class="gauge-box"><canvas id="gauge-water"></canvas></div>
      </div>
    </div>
  </div>

  <!-- NODE 2 -->
  <div class="card">
    <div class="title">Node 2</div>
    <button onclick="toggleView(2)">Toggle View</button>
    <div class="values">
      <div class="value">Temp <span>--</span></div>
      <div class="value">Hum <span>--</span></div>
      <div class="value">Water Level <span>--</span></div>
    </div>
    <div><canvas></canvas></div>
  </div>

  <!-- NODE 3 -->
  <div class="card">
    <div class="title">Node 3</div>
    <button onclick="toggleView(3)">Toggle View</button>
    <div class="values">
      <div class="value">Temp <span>--</span></div>
      <div class="value">Hum <span>--</span></div>
      <div class="value">Water Level <span>--</span></div>
    </div>
    <div><canvas></canvas></div>
  </div>

  <!-- NODE 4 -->
  <div class="card">
    <div class="title">Node 4</div>
    <button onclick="toggleView(4)">Toggle View</button>
    <div class="values">
      <div class="value">Temp <span>--</span></div>
      <div class="value">Hum <span>--</span></div>
      <div class="value">Water Level <span>--</span></div>
    </div>
    <div><canvas></canvas></div>
  </div>

</div>

<script>
const topic = "esp32/dht22";
const client = mqtt.connect("wss://broker.hivemq.com:8884/mqtt");

let viewState = {1:"graph"};

function toggleView(node){
  const graph = document.getElementById(`node${node}-graph`);
  const gauge = document.getElementById(`node${node}-gauge`);
  if(viewState[node] === "graph"){
    graph.style.display = "none";
    gauge.style.display = "block";
    viewState[node] = "gauge";
  } else {
    graph.style.display = "block";
    gauge.style.display = "none";
    viewState[node] = "graph";
  }
}

// Node 1 Data
const labels = [];
const tempData = [];
const humData = [];

// Graph
const chart1 = new Chart(document.getElementById("chart1"), {
  type: "line",
  data: {
    labels: labels,
    datasets: [
      {
        label:"Temp (°C)",
        data: tempData,
        borderColor:"#e74c3c",
        backgroundColor:"rgba(231,76,60,0.2)",
        tension:0.4,
        borderWidth:2,
        fill:true
      },
      {
        label:"Hum (%)",
        data: humData,
        borderColor:"#3498db",
        backgroundColor:"rgba(52,152,219,0.2)",
        tension:0.4,
        borderWidth:2,
        fill:true
      }
    ]
  },
  options: {
    responsive:true,
    maintainAspectRatio:false,
    animation: {
      duration: 600,
      easing: 'easeOutQuart'
    },
    plugins: { legend: { display:false }},
    scales: {
      x:{ display:false },
      y:{
        display:true,
        grid:{ color:"rgba(255,255,255,0.1)" },
        ticks:{ color:"#ccc", font:{size:10} }
      }
    }
  }
});

// Gauge creation function with smooth animation
function createGauge(canvasId, color){
  return new Chart(document.getElementById(canvasId), {
    type: "doughnut",
    data: { datasets:[{ data:[0,100], backgroundColor:[color,"#444"], borderWidth:0 }] },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      rotation:-90,
      circumference:180,
      cutout:"70%",
      animation:{ animateRotate:true, duration:800, easing:'easeOutQuart' },
      plugins:{ legend:{display:false}}
    }
  });
}

// Node 1 gauges
const gaugeTemp = createGauge("gauge-temp","#e74c3c");
const gaugeHum = createGauge("gauge-hum","#3498db");
const gaugeWater = createGauge("gauge-water","#2ecc71");

// MQTT
client.on("connect", ()=>{
  document.getElementById("status").innerText="✅ Connected";
  client.subscribe(topic);
});

client.on("message",(topic,message)=>{
  try{
    const data = JSON.parse(message.toString());
    const temp = data.temp;
    const hum = data.hum;

    document.getElementById("n1-temp").innerText=temp+"°C";
    document.getElementById("n1-hum").innerText=hum+"%";

    const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    labels.push(time);
    tempData.push(temp);
    humData.push(hum);

    if(labels.length>7){
      labels.shift();
      tempData.shift();
      humData.shift();
    }

    chart1.update();

    // Update gauges with smooth animation
    gaugeTemp.data.datasets[0].data = [temp, 50-temp];
    gaugeHum.data.datasets[0].data = [hum, 100-hum];
    gaugeWater.data.datasets[0].data = [0, 100]; // placeholder

    gaugeTemp.update();
    gaugeHum.update();
    gaugeWater.update();

  } catch(e) {
    document.getElementById("status").innerText="⚠️ Invalid Data";
  }
});

client.on("error",()=>document.getElementById("status").innerText="❌ Error");
client.on("reconnect",()=>document.getElementById("status").innerText="🔄 Reconnecting...");
</script>

</body>
</html>
